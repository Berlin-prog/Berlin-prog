name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: Berlin-prog
          outputs: |
            dist/github-contribution-grid-snake.svg
          color_snake: "#00f7ff"
          color_dots: |
            background: #0d1117
            empty: #0d1117
            low: #161b22
            medium: #0e4429
            high: #39d353

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}